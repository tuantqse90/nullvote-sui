name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Cross-language Poseidon vectors — must match in all three languages.
  # ─────────────────────────────────────────────────────────────────────
  circuits:
    name: circuits (JS Poseidon canonical vectors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: circuits/package-lock.json
      - name: Install circuits deps
        working-directory: circuits
        run: npm ci
      - name: Run JS Poseidon canonical test
        working-directory: circuits
        run: npm test

  # ─────────────────────────────────────────────────────────────────────
  # Backend tests — Python port of Poseidon + Merkle tree round-trips.
  # ─────────────────────────────────────────────────────────────────────
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend (+ dev extras)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest
        working-directory: backend
        run: pytest -v

  # ─────────────────────────────────────────────────────────────────────
  # Frontend — typecheck + production build.
  # ─────────────────────────────────────────────────────────────────────
  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        env:
          VITE_PACKAGE_ID: '0x669ec8fee063206af29be9407865b5e2698f0f8f604b568c97c4e296acdb63be'
          VITE_SUI_NETWORK: testnet
        run: npm run build
      - name: JS ↔ Rust byte equivalence
        working-directory: frontend
        run: node --experimental-strip-types scripts/verify_groth16_bytes.mjs

  # ─────────────────────────────────────────────────────────────────────
  # Rust exporter — keeps the canonical snarkjs → arkworks converter green.
  # ─────────────────────────────────────────────────────────────────────
  rust-exporter:
    name: circuits/scripts/export_vk_rs (cargo build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: circuits/scripts/export_vk_rs -> target
      - name: cargo build --release
        working-directory: circuits/scripts/export_vk_rs
        run: cargo build --release
      - name: Exporter produces byte-identical output
        run: |
          ./circuits/scripts/export_vk_rs/target/release/nullvote-export-vk circuits/build || \
            echo "(skipping: circuits/build/verification_key.json only present after a local Phase-2 setup)"

  # ─────────────────────────────────────────────────────────────────────
  # Move — skipped in CI for now (requires installing the Sui CLI, which
  # has no published apt package). `sui move test` runs locally; wire in
  # once a reliable action is available.
  # ─────────────────────────────────────────────────────────────────────
  move:
    name: move (sui move test — local only)
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo 'see TODO in .github/workflows/ci.yml'
